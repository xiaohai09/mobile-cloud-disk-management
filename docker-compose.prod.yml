services:
  mysql:
    image: mysql:8.0
    container_name: caiyun-mysql
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        tag: "{{.Name}}"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
      MYSQL_DATABASE: caiyun
      MYSQL_USER: ${MYSQL_USER:-caiyun_app}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
      TZ: Asia/Shanghai
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./backend/scripts/init_caiyun_database.sql:/docker-entrypoint-initdb.d/001_init_caiyun_database.sql:ro
    networks:
      - caiyun-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"

  redis:
    image: redis:7.0
    container_name: caiyun-redis
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        tag: "{{.Name}}"
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:?REDIS_PASSWORD is required}"]
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - caiyun-network
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping < /dev/null || redis-cli -a $$REDIS_PASSWORD ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"

  backend-api:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-xiaohai09}/mobile-cloud-disk-management-api:${IMAGE_TAG:-latest}
    container_name: caiyun-api
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        tag: "{{.Name}}"
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${MYSQL_USER:-caiyun_app}
      DB_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
      DB_NAME: caiyun
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      TASK_QUEUE_BACKEND: ${TASK_QUEUE_BACKEND:-list}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-移动云盘}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-false}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost,http://127.0.0.1}
      TASK_CONCURRENCY: 10
      DEFAULT_ADMIN_USERNAME: ${DEFAULT_ADMIN_USERNAME:-admin}
      DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD:?DEFAULT_ADMIN_PASSWORD is required}
    networks:
      - caiyun-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        reservations:
          memory: "256m"
          cpus: "0.5"
        limits:
          memory: 512m
          cpus: "1.0"

  backend-worker:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-xiaohai09}/mobile-cloud-disk-management-worker:${IMAGE_TAG:-latest}
    container_name: caiyun-worker
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        tag: "{{.Name}}"
    ports:
      - "127.0.0.1:8081:8081"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${MYSQL_USER:-caiyun_app}
      DB_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
      DB_NAME: caiyun
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      TASK_QUEUE_BACKEND: ${TASK_QUEUE_BACKEND:-list}
      WORKER_MONITOR_TOKEN: ${WORKER_MONITOR_TOKEN:?WORKER_MONITOR_TOKEN is required}
      TASK_CONCURRENCY: 10
      TASK_SCHEDULE: "0 8 * * *"
      WORKER_MONITOR_HOST: 127.0.0.1
      WORKER_MONITOR_PORT: 8081
      WORKER_MONITOR_ALLOW_PLAINTEXT: ${WORKER_MONITOR_ALLOW_PLAINTEXT:-false}
      ENABLE_EXPORT_WORKER: ${ENABLE_EXPORT_WORKER:-false}
      ENABLE_WEBHOOK_WORKER: ${ENABLE_WEBHOOK_WORKER:-false}
      EXPORT_WORKER_POLL_INTERVAL: ${EXPORT_WORKER_POLL_INTERVAL:-5s}
      WEBHOOK_WORKER_POLL_INTERVAL: ${WEBHOOK_WORKER_POLL_INTERVAL:-5s}
    networks:
      - caiyun-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8081/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        reservations:
          memory: "256m"
          cpus: "0.5"
        limits:
          memory: 1g
          cpus: "1.5"

  backend-export-worker:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-xiaohai09}/mobile-cloud-disk-management-export-worker:${IMAGE_TAG:-latest}
    container_name: caiyun-export-worker
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        tag: "{{.Name}}"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${MYSQL_USER:-caiyun_app}
      DB_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
      DB_NAME: caiyun
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      EXPORT_WORKER_POLL_INTERVAL: ${EXPORT_WORKER_POLL_INTERVAL:-5s}
      EXPORT_WORKER_BATCH_SIZE: ${EXPORT_WORKER_BATCH_SIZE:-10}
    networks:
      - caiyun-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8082/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        reservations:
          memory: "128m"
          cpus: "0.25"
        limits:
          memory: 512m
          cpus: "0.5"

  backend-webhook-worker:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-xiaohai09}/mobile-cloud-disk-management-webhook-worker:${IMAGE_TAG:-latest}
    container_name: caiyun-webhook-worker
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        tag: "{{.Name}}"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${MYSQL_USER:-caiyun_app}
      DB_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
      DB_NAME: caiyun
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      WEBHOOK_WORKER_POLL_INTERVAL: ${WEBHOOK_WORKER_POLL_INTERVAL:-5s}
      WEBHOOK_WORKER_RECENT_LIMIT: ${WEBHOOK_WORKER_RECENT_LIMIT:-20}
    networks:
      - caiyun-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8083/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        reservations:
          memory: "128m"
          cpus: "0.25"
        limits:
          memory: 512m
          cpus: "0.5"

  frontend:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-xiaohai09}/mobile-cloud-disk-management-frontend:${IMAGE_TAG:-latest}
    container_name: caiyun-frontend
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        tag: "{{.Name}}"
    ports:
      - "127.0.0.1:80:8080"
    depends_on:
      backend-api:
        condition: service_healthy
    networks:
      - caiyun-network
    deploy:
      resources:
        reservations:
          memory: "64m"
          cpus: "0.1"
        limits:
          memory: 128m
          cpus: "0.25"

  grafana:
    image: grafana/grafana:10.4.2
    container_name: caiyun-grafana
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        tag: "{{.Name}}"
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD is required}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./backend/configs/grafana_dashboard.json:/var/lib/grafana/dashboards/caiyun.json:ro
      - ./backend/configs/grafana_provisioning:/etc/grafana/provisioning:ro
    networks:
      - caiyun-network
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"

volumes:
  mysql-data:
  redis-data:
  grafana-data:

networks:
  caiyun-network:
    driver: bridge
