services:
  backend-api:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-xiaohai09}/mobile-cloud-disk-management-api:${IMAGE_TAG:-latest}
    container_name: caiyun-api
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${MYSQL_USER:-caiyun_app}
      DB_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
      DB_NAME: caiyun
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      TASK_QUEUE_BACKEND: ${TASK_QUEUE_BACKEND:-list}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-移动云盘}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-false}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost,http://127.0.0.1}
      TASK_CONCURRENCY: 10
      DEFAULT_ADMIN_USERNAME: ${DEFAULT_ADMIN_USERNAME:-admin}
      DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD:-admin123}
    networks:
      - caiyun-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.0"

  backend-worker:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-xiaohai09}/mobile-cloud-disk-management-worker:${IMAGE_TAG:-latest}
    container_name: caiyun-worker
    restart: unless-stopped
    ports:
      - "127.0.0.1:8081:8081"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${MYSQL_USER:-caiyun_app}
      DB_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
      DB_NAME: caiyun
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      TASK_QUEUE_BACKEND: ${TASK_QUEUE_BACKEND:-list}
      WORKER_MONITOR_TOKEN: ${WORKER_MONITOR_TOKEN:?WORKER_MONITOR_TOKEN is required}
      TASK_CONCURRENCY: 10
      TASK_SCHEDULE: "0 8 * * *"
      WORKER_MONITOR_HOST: 0.0.0.0
      WORKER_MONITOR_PORT: 8081
      WORKER_MONITOR_ALLOW_PLAINTEXT: "false"
    networks:
      - caiyun-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8081/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.5"

  frontend:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-xiaohai09}/mobile-cloud-disk-management-frontend:${IMAGE_TAG:-latest}
    container_name: caiyun-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:80:8080"
    depends_on:
      - backend-api
    networks:
      - caiyun-network
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.25"
