limit_req_zone $binary_remote_addr zone=api_req:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=ws_req:10m rate=2r/s;
limit_conn_zone $binary_remote_addr zone=addr_conn:10m;

server {
    listen 8080;
    server_name _;
    server_tokens off;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    # CSP 中 connect-src 限定本域 WebSocket，避免任意 ws/wss。
    # 反代部署时按实际域名收紧，例如 wss://caiyun.example.com。
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'" always;

    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 10m;

    location /api/ {
        limit_req zone=api_req burst=30 nodelay;
        limit_conn addr_conn 20;
        proxy_pass http://backend-api:8080;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering on;
        proxy_request_buffering on;
    }

    location = /api {
        limit_req zone=api_req burst=30 nodelay;
        limit_conn addr_conn 20;
        proxy_pass http://backend-api:8080;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ws {
        limit_req zone=ws_req burst=10 nodelay;
        limit_conn addr_conn 10;
        proxy_pass http://backend-api:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
