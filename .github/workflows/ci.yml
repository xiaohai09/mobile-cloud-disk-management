name: CI - Build and Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  backend-build:
    name: Backend Build & Test (${{ matrix.go-version }}-${{ matrix.runs-on }})
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        go-version: ['1.25']
        runs-on: [ubuntu-latest, ubuntu-22.04-arm]
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go matrix
        uses: actions/setup-go@v5
        with:
          go-version: '${{ matrix.go-version }}'
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Verify Go version
        run: go version

      - name: Download dependencies
        run: go mod download

      - name: Run Go vet
        run: go vet ./...

      - name: Run unit tests with coverage
        run: go test ./... -v -count=1 -timeout=5m -coverprofile=coverage.out

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-${{ github.sha }}-${{ matrix.go-version }}-${{ matrix.runs-on }}
          path: backend/coverage.out
          retention-days: 30

      - name: Build API binary
        run: go build -o /tmp/caiyun-api-test ./cmd/api

      - name: Build Worker binary
        run: go build -o /tmp/caiyun-worker-test ./cmd/worker

      - name: Upload API binary
        uses: actions/upload-artifact@v4
        with:
          name: caiyun-api-${{ github.sha }}-${{ matrix.go-version }}-${{ matrix.runs-on }}
          path: /tmp/caiyun-api-test
          retention-days: 7

      - name: Upload Worker binary
        uses: actions/upload-artifact@v4
        with:
          name: caiyun-worker-${{ github.sha }}-${{ matrix.go-version }}-${{ matrix.runs-on }}
          path: /tmp/caiyun-worker-test
          retention-days: 7

  frontend-build:
    name: Frontend Build & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run typecheck
        run: npm run typecheck

      - name: Build production bundle
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist-${{ github.sha }}
          path: frontend/dist/
          retention-days: 7

  docker-build:
    name: Docker Multi-stage Build
    runs-on: ubuntu-latest
    needs: [backend-build, frontend-build]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: backend/Dockerfile.api
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/mobile-cloud-disk-management-api:${{ github.sha }},ghcr.io/${{ github.repository_owner }}/mobile-cloud-disk-management-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Worker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: backend/Dockerfile.worker
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/mobile-cloud-disk-management-worker:${{ github.sha }},ghcr.io/${{ github.repository_owner }}/mobile-cloud-disk-management-worker:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/mobile-cloud-disk-management-frontend:${{ github.sha }},ghcr.io/${{ github.repository_owner }}/mobile-cloud-disk-management-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest

      - name: Run gosec static analysis
        run: gosec -fmt=json -out=gosec-results.json ./...
        working-directory: backend
        continue-on-error: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck -json ./... | tee govulncheck-results.json
        working-directory: backend
        continue-on-error: true

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'HIGH,CRITICAL'
          ignore-unfixed: true

      - name: Upload gosec results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gosec-results-${{ github.sha }}
          path: backend/gosec-results.json
          retention-days: 30

      - name: Upload govulncheck results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: govulncheck-results-${{ github.sha }}
          path: backend/govulncheck-results.json
          retention-days: 30

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
